<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FAFBFE"/>

  <!-- Gradient mesh -->
  <circle cx="300" cy="200" r="250" fill="#34D399" opacity="0.06" filter="url(#blur)"/>
  <circle cx="900" cy="400" r="200" fill="#F4945E" opacity="0.05" filter="url(#blur)"/>
  <circle cx="600" cy="100" r="180" fill="#C084FC" opacity="0.04" filter="url(#blur)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1A1D2E" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Brand name -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="72" fill="#1A1D2E">
    Fuel<tspan fill="#34D399">Well</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="28" fill="#64748B">
    AI-Powered Nutrition &amp; Fitness Coaching
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="20" fill="#94A3B8">
    Fuel Well, Feel Well.
  </text>

  <!-- CTA pill -->
  <rect x="475" y="420" width="250" height="48" rx="24" fill="url(#btn-grad)"/>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="white">Join the Founders 100</text>

  <defs>
    <linearGradient id="btn-grad" x1="475" y1="420" x2="725" y2="468">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>
</svg>
